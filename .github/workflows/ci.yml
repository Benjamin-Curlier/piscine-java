name: CI

# CI (#11a + #11b) : build moulinette, lint exos, build site, et validation des
# solutions de référence (chaque solution doit passer ses propres tests).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Les actions v4 tournent encore sur Node 20 (déprécié, retiré des runners en sept. 2026) :
# on force Node 24 dès maintenant, comme recommandé par GitHub.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  moulinette:
    name: Moulinette (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configurer l'identité git (suite @Tag("git"))
        run: |
          git config --global user.email "ci@etnc.local"
          git config --global user.name "CI ETNC"

      - name: Build + tests unitaires + uber-jar
        run: ./gradlew build shadowJar
        working-directory: moulinette

      - name: Suite d'intégration git
        run: ./gradlew :console:testGit
        working-directory: moulinette

      - name: Suite outillage (compile/test/style réels)
        run: ./gradlew :console:testTools
        working-directory: moulinette

      - name: Suite bout en bout
        run: ./gradlew :console:testE2e
        working-directory: moulinette

  lint-exercices:
    name: Lint exercices
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assurer PyYAML (validation YAML sémantique)
        run: python3 -c "import yaml" 2>/dev/null || python3 -m pip install --quiet pyyaml
      - name: Vérifier la conformité des exercices
        run: bash scripts/lint-exercices.sh

  build-docusaurus:
    name: Build site Docusaurus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: courses
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: courses/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Build du site
        run: npm run build

  valider-solutions:
    name: Valider les solutions de référence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Tester chaque solution de référence
        run: bash scripts/valider-solutions.sh
